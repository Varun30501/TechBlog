spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url={DB_URL}
spring.datasource.username={DB_USERNAME}
spring.datasource.password={DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# FIX: MySQL8Dialect was removed in Hibernate 6 (Spring Boot 3). Use MySQLDialect.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript

management.endpoints.web.exposure.include=health,info,metrics

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Password reset email ──
# Sent over HTTPS via Resend's API (https://resend.com), NOT SMTP — most
# production hosts block outbound SMTP ports, so this avoids that entirely.
# Leave app.email.api-key blank for local dev: reset links are logged to
# the console instead of emailed, so the flow still works without an account.

# Base URL of the Angular app, used to build the link inside the reset email.
app.frontend-url=http://localhost:4200