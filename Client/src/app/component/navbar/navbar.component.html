<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top app-navbar">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/home">
      <span class="brand-mark"><i class="bi bi-journal-richtext"></i></span>
      <span>TechBlog</span>
    </a>

    <button class="navbar-toggler border-0 shadow-none" type="button"
            data-bs-toggle="collapse" data-bs-target="#primaryNavigation"
            aria-controls="primaryNavigation" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="primaryNavigation">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active">
            <i class="bi bi-house me-1 d-none d-xl-inline"></i>Home
          </a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-tags me-1 d-none d-xl-inline"></i>Categories
          </a>
          <ul class="dropdown-menu shadow-sm border-0" style="border-radius:10px;">
            <li *ngFor="let category of categories">
              <a class="dropdown-item" [routerLink]="['/category', category.categoryId]">
                {{category.categoryName}}
              </a>
            </li>
            <li *ngIf="categories.length === 0">
              <span class="dropdown-item text-muted">No categories yet</span>
            </li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/search" routerLinkActive="active">
            <i class="bi bi-compass me-1 d-none d-xl-inline"></i>Explore
          </a>
        </li>
        <li class="nav-item" *ngIf="isSignedIn">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <i class="bi bi-grid me-1 d-none d-xl-inline"></i>Dashboard
          </a>
        </li>
      </ul>

      <form class="d-flex nav-search me-lg-3" (submit)="search(navSearch.value); $event.preventDefault()">
        <label class="visually-hidden" for="navSearch">Search posts</label>
        <input id="navSearch" class="form-control" type="search" placeholder="Search posts…" #navSearch>
        <button class="btn btn-dark" type="submit" aria-label="Search">
          <i class="bi bi-search"></i>
        </button>
      </form>

      <div class="d-flex align-items-center gap-2">
        <ng-container *ngIf="!isSignedIn; else signedIn">
          <a class="btn btn-outline-dark btn-sm" routerLink="/signin">
            <i class="bi bi-box-arrow-in-right"></i>Sign in
          </a>
          <a class="btn btn-dark btn-sm" routerLink="/signup">
            <i class="bi bi-person-plus"></i>Join free
          </a>
        </ng-container>

        <ng-template #signedIn>
          <a class="nav-user-chip d-none d-lg-flex align-items-center gap-1 text-decoration-none" routerLink="/profile">
            <i class="bi bi-person-circle"></i>{{userName}}
          </a>
          <button class="btn btn-outline-dark btn-sm" type="button" (click)="logout()">
            <i class="bi bi-box-arrow-right"></i>Logout
          </button>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
