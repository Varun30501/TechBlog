<section class="admin-hero">
  <div class="container">
    <a class="back-link mb-3" routerLink="/manage-comments"><i class="bi bi-arrow-left"></i> Comments</a>
    <h1 class="display-5 mb-2">Update comment</h1>
    <p class="lead mb-0">Edit a reader response without losing its post association.</p>
  </div>
</section>

<section class="page-shell">
  <div class="container">
    <div class="alert alert-danger" *ngIf="errorMessage">{{errorMessage}}</div>

    <div class="editor-panel" *ngIf="comment as currentComment; else loading">
      <form (submit)="updateComment(); $event.preventDefault()">
        <div class="mb-3">
          <label class="form-label" for="commentId">Comment ID</label>
          <input type="number" class="form-control" id="commentId" [value]="currentComment.commentId" readonly>
        </div>

        <div class="mb-4">
          <label class="form-label" for="content">Comment</label>
          <textarea class="form-control" id="content" rows="6" required [(ngModel)]="currentComment.content" name="content"></textarea>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a class="btn btn-outline-dark" routerLink="/manage-comments">Cancel</a>
          <button type="submit" class="btn btn-dark" [disabled]="saving">
            <span class="spinner-border spinner-border-sm me-2" *ngIf="saving"></span>
            <i class="bi bi-save me-1" *ngIf="!saving"></i>
            Save comment
          </button>
        </div>
      </form>
    </div>

    <ng-template #loading>
      <div class="placeholder-card placeholder-glow">
        <span class="placeholder col-7"></span>
        <span class="placeholder col-12"></span>
      </div>
    </ng-template>
  </div>
</section>
